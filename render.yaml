services:
  - type: web
    name: formatura-micaelle
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python seed.py
    startCommand: gunicorn formatura.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "formatura-micaelle.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: formatura-db
          property: connectionString

databases:
  - name: formatura-db
    plan: free
